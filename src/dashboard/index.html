<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>curator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      curator
    </div>
    <input id="search" type="search" placeholder="Search by name, description, or tag (try “kotlin”)…" autocomplete="off" />
    <button id="rescanBtn" class="btn" type="button" title="Re-scan ~/.claude — recomputes clusters, topics, token costs">↻ Rescan</button>
    <button id="newTopicBtn" class="btn" type="button">+ New topic</button>
    <button id="newSkillBtn" class="btn primary" type="button">+ New skill</button>
    <div class="counts" id="counts"></div>
  </header>

  <main class="layout">
    <aside class="sidebar" id="sidebar">
      <section>
        <h2>Library</h2>
        <ul class="filter-list">
          <li><button class="filter-btn active" data-filter="all">All skills <span class="count" id="cAll">0</span></button></li>
          <li><button class="filter-btn" data-filter="orphans">Untagged <span class="count" id="cOrphan">0</span></button></li>
        </ul>
      </section>
      <section>
        <h2>By origin</h2>
        <ul id="origins" class="filter-list"></ul>
      </section>
      <section>
        <h2>Topics</h2>
        <ul id="topics" class="filter-list"></ul>
      </section>
      <section>
        <h2>Clusters</h2>
        <ul id="clusters" class="filter-list"></ul>
      </section>
    </aside>

    <section class="list-pane">
      <div class="list-header">
        <span id="listHeader">All skills</span>
        <span class="sublabel" id="listSubheader"></span>
      </div>
      <ul id="skillList" class="skill-list"></ul>
    </section>

    <section class="detail-pane" id="detail">
      <div class="detail-inner empty">Loading…</div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <div id="topicModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-head">
        <h2>New topic</h2>
        <button class="modal-close" id="topicModalCloseBtn" type="button" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <label>
          <span>Topic tag</span>
          <input id="topicTagInput" type="text" placeholder="frontend" autocomplete="off" />
          <small>Lowercase. Becomes the <code>tags:</code> entry in each selected skill's frontmatter. Topics emerge in the sidebar when 3+ skills share the tag.</small>
        </label>
        <label>
          <span>Skills to tag <em id="topicSelCount">(0 selected)</em></span>
          <input id="topicSkillFilter" type="text" placeholder="Filter user-owned skills…" autocomplete="off" />
          <div id="topicSkillList" class="skill-picker"></div>
          <small>Plugin-installed skills can't be tagged from the UI (read-only).</small>
        </label>
      </div>
      <div class="modal-foot">
        <button class="btn" id="topicCancelBtn" type="button">Cancel</button>
        <button class="btn primary" id="topicCreateBtn" type="button">Tag selected</button>
      </div>
    </div>
  </div>

  <div id="modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">New skill</h2>
        <button class="modal-close" id="modalCloseBtn" type="button" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <label>
          <span>Name</span>
          <input id="newName" type="text" placeholder="my-cool-skill" autocomplete="off" />
          <small>Lowercase, alphanumeric + hyphens. Becomes the directory name in <code>~/.claude/skills/</code>.</small>
        </label>
        <label>
          <span>Description</span>
          <input id="newDesc" type="text" placeholder="One sentence describing when to invoke this skill." autocomplete="off" />
          <small>This is the eager-loaded text the autorouter sees on every session. Keep it tight — under 100 tokens is ideal.</small>
        </label>
        <label>
          <span>Tags <em>(optional)</em></span>
          <input id="newTags" type="text" placeholder="kotlin, testing" autocomplete="off" />
          <small>Comma-separated. Topics emerge automatically when 3+ skills share a tag.</small>
        </label>
        <label>
          <span>Body <em>(optional)</em></span>
          <textarea id="newBody" rows="8" placeholder="# my-cool-skill&#10;&#10;What this skill does, when to invoke it, and how to use it."></textarea>
          <small>Lazy-loaded — only paid when this skill actually fires.</small>
        </label>
      </div>
      <div class="modal-foot">
        <button class="btn" id="modalCancelBtn" type="button">Cancel</button>
        <button class="btn primary" id="modalCreateBtn" type="button">Create skill</button>
      </div>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
