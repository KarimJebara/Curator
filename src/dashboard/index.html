<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>curator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      curator
    </div>
    <input id="search" type="search" placeholder="Search skills by name or description…" autocomplete="off" />
    <div class="counts" id="counts"></div>
  </header>

  <main class="layout">
    <aside class="sidebar" id="sidebar">
      <section>
        <h2>Library</h2>
        <ul class="filter-list">
          <li><button class="filter-btn active" data-filter="all">All skills <span class="count" id="cAll">0</span></button></li>
          <li><button class="filter-btn" data-filter="user">User-owned <span class="count" id="cUser">0</span></button></li>
          <li><button class="filter-btn" data-filter="plugin">Plugin <span class="count" id="cPlugin">0</span></button></li>
          <li><button class="filter-btn" data-filter="orphans">Untagged <span class="count" id="cOrphan">0</span></button></li>
        </ul>
      </section>
      <section>
        <h2>Topics</h2>
        <ul id="topics" class="filter-list"></ul>
      </section>
      <section>
        <h2>Clusters</h2>
        <ul id="clusters" class="filter-list"></ul>
      </section>
    </aside>

    <section class="list-pane">
      <div class="list-header">
        <span id="listHeader">All skills</span>
        <span class="sublabel" id="listSubheader"></span>
      </div>
      <ul id="skillList" class="skill-list"></ul>
    </section>

    <section class="detail-pane" id="detail">
      <div class="detail-inner empty">Loading…</div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>
